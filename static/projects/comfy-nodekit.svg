<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="ComfyUI node graph">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="0.2" y2="1">
			<stop offset="0%" stop-color="#fed0bb" />
			<stop offset="55%" stop-color="#fcb9b2" />
			<stop offset="100%" stop-color="#f5c4b8" />
		</linearGradient>
		<linearGradient id="node-body" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#351820" />
			<stop offset="100%" stop-color="#12080c" />
		</linearGradient>
	</defs>

	<rect width="400" height="300" fill="url(#bg)" />

	<!-- grid hint -->
	<g opacity="0.12" stroke="#461220" stroke-width="0.5">
		<line x1="40" y1="0" x2="40" y2="260" />
		<line x1="80" y1="0" x2="80" y2="260" />
		<line x1="120" y1="0" x2="120" y2="260" />
		<line x1="160" y1="0" x2="160" y2="260" />
		<line x1="200" y1="0" x2="200" y2="260" />
		<line x1="240" y1="0" x2="240" y2="260" />
		<line x1="280" y1="0" x2="280" y2="260" />
		<line x1="320" y1="0" x2="320" y2="260" />
		<line x1="360" y1="0" x2="360" y2="260" />
		<line x1="0" y1="40" x2="400" y2="40" />
		<line x1="0" y1="80" x2="400" y2="80" />
		<line x1="0" y1="120" x2="400" y2="120" />
		<line x1="0" y1="160" x2="400" y2="160" />
		<line x1="0" y1="200" x2="400" y2="200" />
		<line x1="0" y1="240" x2="400" y2="240" />
	</g>

	<!-- wires -->
	<path d="M 118 92 C 145 92, 145 118, 168 118" fill="none" stroke="#b23a48" stroke-width="2.5" opacity="0.85" />
	<path d="M 118 108 C 150 108, 150 168, 168 168" fill="none" stroke="#8c2f39" stroke-width="2.5" opacity="0.75" />
	<path d="M 248 118 C 275 118, 275 92, 298 92" fill="none" stroke="#b23a48" stroke-width="2.5" opacity="0.85" />
	<path d="M 248 168 C 280 168, 280 108, 298 108" fill="none" stroke="#8c2f39" stroke-width="2.5" opacity="0.75" />
	<path d="M 248 92 C 275 92, 275 148, 298 148" fill="none" stroke="#461220" stroke-width="2.5" opacity="0.65" />

	<!-- node: loader -->
	<g>
		<rect x="48" y="68" width="70" height="52" rx="4" fill="url(#node-body)" stroke="#8c2f39" stroke-width="1.5" />
		<rect x="48" y="68" width="70" height="14" rx="4" fill="#b23a48" />
		<rect x="48" y="78" width="70" height="4" fill="#b23a48" />
		<text x="83" y="79" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="6.5" font-weight="600" fill="#fff8f4">Load</text>
		<circle cx="114" cy="92" r="3" fill="#fcb9b2" stroke="#461220" stroke-width="0.75" />
		<circle cx="114" cy="108" r="3" fill="#fcb9b2" stroke="#461220" stroke-width="0.75" />
	</g>

	<!-- node: encode -->
	<g>
		<rect x="168" y="98" width="80" height="58" rx="4" fill="url(#node-body)" stroke="#8c2f39" stroke-width="1.5" />
		<rect x="168" y="98" width="80" height="14" rx="4" fill="#8c2f39" />
		<rect x="168" y="108" width="80" height="4" fill="#8c2f39" />
		<text x="208" y="109" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="6.5" font-weight="600" fill="#fff8f4">CLIP Encode</text>
		<circle cx="164" cy="118" r="3" fill="#fcb9b2" stroke="#461220" stroke-width="0.75" />
		<circle cx="164" cy="168" r="3" fill="#fcb9b2" stroke="#461220" stroke-width="0.75" />
		<circle cx="252" cy="118" r="3" fill="#fcb9b2" stroke="#461220" stroke-width="0.75" />
		<circle cx="252" cy="168" r="3" fill="#fcb9b2" stroke="#461220" stroke-width="0.75" />
	</g>

	<!-- node: sampler -->
	<g>
		<rect x="298" y="72" width="54" height="88" rx="4" fill="url(#node-body)" stroke="#8c2f39" stroke-width="1.5" />
		<rect x="298" y="72" width="54" height="14" rx="4" fill="#461220" />
		<rect x="298" y="82" width="54" height="4" fill="#461220" />
		<text x="325" y="83" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="6.5" font-weight="600" fill="#fcb9b2">KSampler</text>
		<circle cx="294" cy="92" r="3" fill="#fcb9b2" stroke="#461220" stroke-width="0.75" />
		<circle cx="294" cy="108" r="3" fill="#fcb9b2" stroke="#461220" stroke-width="0.75" />
		<circle cx="294" cy="148" r="3" fill="#fcb9b2" stroke="#461220" stroke-width="0.75" />
	</g>

	<!-- Python badge -->
	<rect x="118" y="188" width="164" height="36" rx="5" fill="#fff8f4" stroke="#8c2f39" stroke-width="1.5" opacity="0.95" />
	<text x="200" y="204" text-anchor="middle" font-family="monospace" font-size="8" font-weight="700" fill="#461220">Edge.build_json_workflow()</text>
	<text x="200" y="216" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="6.5" fill="#8c2f39">typed Python wrappers</text>

	<text x="200" y="278" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="0.1em" fill="#461220">COMFY NODEKIT</text>
</svg>
